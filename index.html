<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daily word test</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            padding: 15px; display: flex; justify-content: center; margin: 0; height: 100vh; box-sizing: border-box; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3); padding: 25px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 1200px; max-height: 95vh; display: flex; flex-direction: column; 
        }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #555; padding-bottom: 12px; margin-bottom: 20px; flex-shrink: 0; }
        h1 { margin: 0; font-size: 24px; color: #2c3e50; font-weight: 900; }
        .nav-menus { display: flex; gap: 8px; }
        .nav-btn { background-color: #2c3e50; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .nav-btn:hover { background-color: #1a252f; transform: translateY(-2px); }
        .nav-btn-secondary { background-color: #6c757d; }
        .nav-btn-secondary:hover { background-color: #5a6268; }

        #score-board { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #2980b9; flex-shrink: 0; }
        
        #test-view, #book-view, #note-view, #manage-view { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; }
        
        .table-container { flex-grow: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eee; border-right: 1px solid #eee; padding: 10px 15px; text-align: center; vertical-align: middle; }
        th { background-color: #f1f3f5; position: sticky; top: 0; z-index: 1; font-size: 15px; color: #333; border-bottom: 2px solid #ddd; }
        td { font-size: 15px; }
        
        input[type="text"] { width: 92%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 15px; background: #fafafa; pointer-events: auto; }
        input[type="text"]:focus { background: #fff; border-color: #8ec5fc; outline: none; box-shadow: 0 0 5px rgba(142, 197, 252, 0.5); }
        
        .result-text { font-size: 14px; margin-top: 5px; display: block; font-weight: bold; word-break: keep-all; }
        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; } 
        
        .concealed { background-color: #2c3e50 !important; color: #2c3e50 !important; border-radius: 6px; cursor: pointer; user-select: none; transition: all 0.3s ease; }
        .concealed:hover { background-color: #ecf0f1 !important; color: #007bff !important; }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-shrink: 0; flex-wrap: wrap; }
        button { padding: 12px 25px; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn-submit { background-color: #27ae60; }
        .btn-submit:hover { background-color: #219a52; transform: translateY(-2px); }
        .btn-reset { background-color: #e74c3c; }
        .btn-reset:hover { background-color: #c0392b; }
        .btn-warning { background-color: #f39c12; }
        .btn-warning:hover { background-color: #d68910; }
        .btn-retest { background-color: #3498db; }
        .btn-retest:hover { background-color: #2980b9; }
        .btn-dark { background-color: #34495e; }
        .btn-dark:hover { background-color: #2c3e50; }
        .btn-purple { background-color: #8e44ad; }
        .btn-purple:hover { background-color: #732d91; }
        .hidden { display: none !important; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-shrink: 0; }
        .input-group input { flex-grow: 1; border: 1px solid #ccc; padding: 12px; border-radius: 5px; font-size: 15px;}
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 13px; cursor: pointer; transition: 0.2s;}
        .btn-delete:hover { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 13px; cursor: pointer; transition: 0.2s; margin-right: 5px; }
        .btn-edit:hover { background-color: #d68910; }
        .btn-add-book { background-color: #2980b9; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-add-book:hover { background-color: #1f618d; }

        .editable-word { cursor: context-menu; position: relative; }
        .editable-word:hover::after {
            content: '✏️우클릭 수정';
            position: absolute;
            right: -10px;
            top: -10px;
            font-size: 11px;
            background: #333;
            color: #fff;
            padding: 3px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
    </style>

    <script src="words.js" charset="UTF-8"></script>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <h1 id="main-title">Daily word test 📝</h1>
        <div class="nav-menus">
            <button id="toggle-meaning-btn" class="nav-btn nav-btn-secondary hidden" onclick="toggleMeanings()">뜻 가리기 ⬛</button>
            <button class="nav-btn" onclick="switchView('test')">📝 시험 보기</button>
            <button class="nav-btn" style="background-color: #2980b9;" onclick="switchView('book')">📖 내 단어장</button>
            <button class="nav-btn" onclick="switchView('note')">📒 오답 노트</button>
            <button class="nav-btn" style="background-color: #8e44ad;" onclick="switchView('manage')">⚙️ 단어 풀 관리</button>
        </div>
    </div>

    <div id="test-view">
        <div id="score-board"></div>
        
        <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; font-size: 14px; font-weight: bold; color: #333;">
            <label for="question-count-select" style="margin-right: 8px;">시험 문항 수:</label>
            <select id="question-count-select" onchange="handleQuestionCountChange()" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; font-size: 14px;">
                <option value="30">30단어</option>
                <option value="50">50단어</option>
                <option value="custom">직접 입력</option>
            </select>
            <input type="number" id="custom-question-count" class="hidden" style="width: 70px; padding: 5px; margin-left: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px;" min="1" placeholder="개수 입력">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th style="width: 8%;">NO</th><th style="width: 25%;">단어 (Word)</th><th style="width: 67%;">뜻 (Meaning)</th></tr>
                </thead>
                <tbody id="test-body"></tbody>
            </table>
        </div>
        <div class="btn-group">
            <button class="btn-submit" id="btn-grade" onclick="gradeTest()">채점하기</button>
            <button class="btn-retest" onclick="retestCurrent()">현재 단어로 재시험</button>
            <button class="btn-reset" onclick="startNewTest()">새로운 문제 풀기</button>
        </div>
    </div>

    <div id="book-view" class="hidden">
        <div style="text-align: center; margin-bottom: 15px; color: #333;">
            <strong style="font-size: 15px;">나만의 단어 보관소입니다. 가려진 뜻에 마우스를 올리면 정답이 보입니다. (총 <span id="book-count" style="color: #2980b9; font-weight: bold;">0</span>개)</strong>
        </div>
        <div class="input-group">
            <input type="text" id="book-new-word" placeholder="단어장에 직접 추가할 영단어">
            <input type="text" id="book-new-meanings" placeholder="뜻 (쉼표로 구분)">
            <button class="btn-submit" style="padding: 10px 25px; background-color: #2980b9;" onclick="addWordToBookDirect()">단어장 등록</button>
        </div>
        <div class="table-container" style="flex-grow: 1;">
            <table>
                <thead>
                    <tr><th style="width: 8%;">NO</th><th style="width: 25%;">단어</th><th style="width: 52%;">뜻</th><th style="width: 15%;">관리</th></tr>
                </thead>
                <tbody id="book-body"></tbody>
            </table>
        </div>
    </div>

    <div id="note-view" class="hidden">
        <div style="text-align: center; margin-bottom: 15px; color: #555;"><strong style="font-size: 15px;">틀린 단어장입니다. 가려진 뜻에 마우스를 올리면 정답이 보입니다.</strong></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th style="width: 8%;">NO</th><th style="width: 25%;">단어 (Word)</th><th style="width: 47%;">정답 (Meaning)</th><th style="width: 20%;">관리</th></tr>
                </thead>
                <tbody id="note-body"></tbody>
            </table>
        </div>
        <div class="btn-group">
            <button class="btn-submit" onclick="startIncorrectTest()">전체 오답 다시 풀기</button>
            <button class="btn-purple" onclick="startRangeIncorrectTest()">범위 지정 시험</button>
            <button class="btn-retest" onclick="shuffleIncorrectNote()">오답 섞기</button>
            <button class="btn-dark" onclick="restoreIncorrectNoteOrder()">원래 순서로</button>
            <button class="btn-warning" onclick="clearIncorrectNote()">오답노트 초기화</button>
        </div>
    </div>

    <div id="manage-view" class="hidden">
        <div style="text-align: center; margin-bottom: 15px; color: #333;">
            <strong style="font-size: 15px;">전체 단어 풀 관리 공간입니다. 검색, 추가, 수정, 삭제가 가능합니다. (총 <span id="manage-count" style="color: #8e44ad; font-weight: bold;">0</span>개)</strong>
        </div>
        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="manage-new-word" placeholder="추가할 영단어" style="flex: 1;">
                <input type="text" id="manage-new-meanings" placeholder="뜻 (쉼표로 구분)" style="flex: 2;">
                <button class="btn-submit" onclick="addManageWord()">➕ 단어 추가</button>
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="text" id="manage-search" placeholder="🔍 원하는 단어 또는 뜻 검색..." onkeyup="searchManageWord()">
            </div>
        </div>
        <div class="table-container" style="flex-grow: 1;">
            <table>
                <thead>
                    <tr><th style="width: 8%;">NO</th><th style="width: 25%;">단어</th><th style="width: 52%;">뜻</th><th style="width: 15%;">관리</th></tr>
                </thead>
                <tbody id="manage-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const synonymGroups = [
        ["중지", "중단", "정지", "그만", "멈춤", "끝내"],
        ["명백", "명확", "분명", "확실", "뚜렷", "해명"],
        ["감소", "하락", "축소", "줄어", "감퇴", "쇠퇴"],
        ["증가", "상승", "확대", "늘어", "오름", "급증"],
        ["버리", "포기", "단념", "저버리", "유기"],
        ["혐오", "미워", "싫어", "증오", "역겹", "경멸"],
        ["제공", "주다", "부여", "수여", "공급", "지급"],
        ["요약", "단축", "줄이", "생략", "축약"]
    ];

    let currentQuestions = [];
    let isMeaningHidden = false; 
    let incorrectWords = [];
    let myBookList = [];       
    let mainManageList = [];   

    window.onload = function() {
        try { 
            const parsed = JSON.parse(localStorage.getItem('incorrectWords'));
            if (Array.isArray(parsed)) {
                incorrectWords = parsed.map((w, idx) => {
                    if (!w.timestamp) w.timestamp = Date.now() + idx; 
                    return w;
                });
            }
        } catch(e) {}
        try {
            const savedBook = localStorage.getItem('userCustomBookStore');
            if (savedBook) myBookList = JSON.parse(savedBook);
        } catch(e) {}
        try {
            const savedManage = JSON.parse(localStorage.getItem('myManageList'));
            if (savedManage && savedManage.length > 0) {
                mainManageList = savedManage;
            } else if (typeof defaultWords !== 'undefined') {
                mainManageList = [...defaultWords];
            } else if (typeof additionalWords !== 'undefined') { 
                mainManageList = [...additionalWords];
            } else {
                mainManageList = [];
            }
        } catch(e) {
            mainManageList = typeof defaultWords !== 'undefined' ? [...defaultWords] : [];
        }
        startNewTest();
    };

    function getTestLimit() {
        const select = document.getElementById('question-count-select');
        if (!select) return 30;
        if (select.value === 'custom') {
            const customVal = parseInt(document.getElementById('custom-question-count').value, 10);
            return (isNaN(customVal) || customVal < 1) ? 50 : customVal;
        }
        return parseInt(select.value, 10);
    }

    function handleQuestionCountChange() {
        const selectVal = document.getElementById('question-count-select').value;
        const customInput = document.getElementById('custom-question-count');
        if (selectVal === 'custom') {
            customInput.classList.remove('hidden');
            if(!customInput.value) customInput.value = 50;
            customInput.focus();
        } else {
            customInput.classList.add('hidden');
        }
    }

    function switchView(viewName) {
        document.getElementById('test-view').classList.add('hidden');
        document.getElementById('book-view').classList.add('hidden');
        document.getElementById('note-view').classList.add('hidden');
        document.getElementById('manage-view').classList.add('hidden');
        document.getElementById('toggle-meaning-btn').classList.add('hidden');

        if (viewName === 'test') {
            document.getElementById('test-view').classList.remove('hidden');
            document.getElementById('main-title').innerText = 'Daily word test 📝';
        } else if (viewName === 'book') {
            document.getElementById('book-view').classList.remove('hidden');
            document.getElementById('toggle-meaning-btn').classList.remove('hidden'); 
            document.getElementById('main-title').innerText = '나만의 보관함 📖';
            renderBookTable();
        } else if (viewName === 'note') {
            document.getElementById('note-view').classList.remove('hidden');
            document.getElementById('toggle-meaning-btn').classList.remove('hidden');
            document.getElementById('main-title').innerText = '나만의 오답노트 📒';
            renderIncorrectNote();
        } else if (viewName === 'manage') {
            document.getElementById('manage-view').classList.remove('hidden');
            document.getElementById('main-title').innerText = '단어 풀 관리 ⚙️';
            renderManageTable();
        }
    }

    function toggleMeanings() {
        isMeaningHidden = !isMeaningHidden;
        const btn = document.getElementById('toggle-meaning-btn');
        btn.innerText = isMeaningHidden ? '뜻 보이기 👁️' : '뜻 가리기 ⬛';
        renderIncorrectNote();
        renderBookTable(); 
    }

    function renderBookTable() {
        const tbody = document.getElementById('book-body');
        tbody.innerHTML = '';
        document.getElementById('book-count').innerText = myBookList.length;

        if (myBookList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="padding: 40px; color: #888;">보관함이 비어있습니다. 오답노트에서 추가하거나 등록해 보세요!</td></tr>`;
            return;
        }

        myBookList.forEach((item, index) => {
            const safeMeanings = Array.isArray(item.meanings) ? item.meanings : [item.meanings];
            const tr = document.createElement('tr');
            const hideClass = isMeaningHidden ? 'concealed' : ''; 
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td style="font-weight: bold; color: #2c3e50; font-size: 16px;">${item.word}</td>
                <td style="padding: 10px;">
                    <div class="${hideClass}" style="display:inline-block; padding: 6px 10px; width: 100%; box-sizing: border-box; color: #007bff; font-weight: bold;">${safeMeanings.join(', ')}</div>
                </td>
                <td><button class="btn-delete" onclick="deleteFromBook(${index})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function addWordToBookDirect() {
        const wordInput = document.getElementById('book-new-word').value.trim();
        const meaningsInput = document.getElementById('book-new-meanings').value.trim();
        if (!wordInput || !meaningsInput) return alert("영단어와 뜻을 모두 입력해주세요!");
        
        const meaningsArray = meaningsInput.split(',').map(s => s.trim()).filter(s => s.length > 0);
        myBookList.push({ word: wordInput, meanings: meaningsArray });
        localStorage.setItem('userCustomBookStore', JSON.stringify(myBookList));
        
        document.getElementById('book-new-word').value = '';
        document.getElementById('book-new-meanings').value = '';
        renderBookTable();
    }

    function deleteFromBook(index) {
        if (confirm(`'${myBookList[index].word}' 단어를 보관함에서 삭제할까요?`)) {
            myBookList.splice(index, 1);
            localStorage.setItem('userCustomBookStore', JSON.stringify(myBookList));
            renderBookTable();
        }
    }

    function renderManageTable() {
        const tbody = document.getElementById('manage-body');
        tbody.innerHTML = '';
        document.getElementById('manage-count').innerText = mainManageList.length;

        mainManageList.forEach((item, index) => {
            const safeMeanings = Array.isArray(item.meanings) ? item.meanings : [item.meanings];
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td style="font-weight: bold; color: #333; font-size: 16px;">${item.word}</td>
                <td style="color: #007bff; font-weight: bold;">${safeMeanings.join(', ')}</td>
                <td>
                    <button class="btn-edit" onclick="editManageWord(${index})">수정</button>
                    <button class="btn-delete" onclick="deleteManageWord(${index})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function saveManageList() {
        localStorage.setItem('myManageList', JSON.stringify(mainManageList));
    }

    function addManageWord() {
        const w = document.getElementById('manage-new-word').value.trim();
        const m = document.getElementById('manage-new-meanings').value.trim();
        if (!w || !m) return alert("단어와 뜻을 모두 입력해주세요.");
        
        const mArr = m.split(',').map(s => s.trim()).filter(s => s.length > 0);
        mainManageList.unshift({ word: w, meanings: mArr }); 
        saveManageList();
        renderManageTable();
        document.getElementById('manage-new-word').value = '';
        document.getElementById('manage-new-meanings').value = '';
    }

    function editManageWord(index) {
        const item = mainManageList[index];
        const newWord = prompt("단어를 수정하세요:", item.word);
        if (newWord === null) return;
        
        const currentMeanings = Array.isArray(item.meanings) ? item.meanings.join(', ') : item.meanings;
        const newMeanings = prompt("뜻을 수정하세요 (쉼표로 구분):", currentMeanings);
        if (newMeanings === null) return;

        mainManageList[index].word = newWord.trim();
        mainManageList[index].meanings = newMeanings.split(',').map(s => s.trim()).filter(s => s.length > 0);
        saveManageList();
        renderManageTable();
    }

    function deleteManageWord(index) {
        if (confirm(`'${mainManageList[index].word}' 단어를 풀에서 완전히 삭제하시겠습니까?`)) {
            mainManageList.splice(index, 1);
            saveManageList();
            renderManageTable();
        }
    }

    function searchManageWord() {
        const keyword = document.getElementById('manage-search').value.toLowerCase();
        const rows = document.querySelectorAll('#manage-body tr');
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(keyword) ? '' : 'none';
        });
    }

    function handleRightClickEdit(event, testIndex) {
        event.preventDefault(); 
        
        const q = currentQuestions[testIndex];
        const originalWord = q.word;

        const manageIndex = mainManageList.findIndex(item => item.word === originalWord);
        let targetItem = manageIndex !== -1 ? mainManageList[manageIndex] : q; 

        const newWord = prompt(`[${originalWord}] 단어를 수정하세요:`, targetItem.word);
        if (newWord === null) return; 
        
        const currentMeanings = Array.isArray(targetItem.meanings) ? targetItem.meanings.join(', ') : targetItem.meanings;
        const newMeanings = prompt(`[${newWord}] 뜻을 수정하세요 (쉼표로 구분):`, currentMeanings);
        if (newMeanings === null) return;

        const updatedWord = newWord.trim();
        const updatedMeanings = newMeanings.split(',').map(s => s.trim()).filter(s => s.length > 0);

        if(manageIndex !== -1) {
            mainManageList[manageIndex].word = updatedWord;
            mainManageList[manageIndex].meanings = updatedMeanings;
            saveManageList();
        }

        currentQuestions[testIndex].word = updatedWord;
        currentQuestions[testIndex].meanings = updatedMeanings;
        event.currentTarget.innerText = updatedWord; 

        const noteIndex = incorrectWords.findIndex(n => n.word === originalWord);
        if (noteIndex !== -1) {
            incorrectWords[noteIndex].word = updatedWord;
            incorrectWords[noteIndex].meanings = updatedMeanings;
            try { localStorage.setItem('incorrectWords', JSON.stringify(incorrectWords)); } catch(e) {}
        }

        const bookIndex = myBookList.findIndex(b => b.word === originalWord);
        if (bookIndex !== -1) {
            myBookList[bookIndex].word = updatedWord;
            myBookList[bookIndex].meanings = updatedMeanings;
            try { localStorage.setItem('userCustomBookStore', JSON.stringify(myBookList)); } catch(e) {}
        }

        alert(`단어가 성공적으로 수정되었습니다.\n- 단어: ${updatedWord}\n- 뜻: ${updatedMeanings.join(', ')}`);
    }

    function startTestWithData(wordData, limit = getTestLimit()) {
        if (!wordData || wordData.length === 0) return;
        const tbody = document.getElementById('test-body');
        tbody.innerHTML = '';
        document.getElementById('score-board').innerText = '';

        wordData.forEach(w => {
            if (typeof w.testCount === 'undefined') w.testCount = 0;
            w._randomSeed = Math.random(); 
        });

        let sortedWords = [...wordData].sort((a, b) => {
            if (a.testCount === b.testCount) {
                return a._randomSeed - b._randomSeed;
            }
            return a.testCount - b.testCount;
        });

        const testCount = Math.min(limit, sortedWords.length);
        currentQuestions = sortedWords.slice(0, testCount);

        currentQuestions.forEach(q => {
            q.testCount += 1;
        });

        if (wordData === mainManageList) {
            saveManageList();
        }

        currentQuestions.forEach((q, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="editable-word" style="font-weight: bold; font-size: 16px; color: #333;" title="우클릭하여 단어 및 뜻 수정" oncontextmenu="handleRightClickEdit(event, ${index})">${q.word}</td>
                <td>
                    <input type="text" id="answer-${index}" autocomplete="off">
                    <span id="result-${index}" class="result-text"></span>
                </td>
            `;
            tbody.appendChild(tr);
        });
        document.querySelector('#test-view .table-container').scrollTop = 0;
    }

    function startNewTest() {
        if (mainManageList.length === 0) return alert("출제할 단어 데이터가 없습니다! 단어 관리를 확인해주세요.");
        startTestWithData(mainManageList);
    }

    function retestCurrent() {
        if (currentQuestions.length === 0) return alert("현재 출제된 단어가 없습니다!");
        const limit = currentQuestions.length;
        const tbody = document.getElementById('test-body');
        tbody.innerHTML = '';
        document.getElementById('score-board').innerText = '진행하던 단어들의 위치가 재배치되었습니다. 다시 풀어보세요!';

        let newArr = [...currentQuestions];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        currentQuestions = newArr;

        currentQuestions.forEach((q, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="editable-word" style="font-weight: bold; font-size: 16px; color: #333;" title="우클릭하여 단어 및 뜻 수정" oncontextmenu="handleRightClickEdit(event, ${index})">${q.word}</td>
                <td>
                    <input type="text" id="answer-${index}" autocomplete="off">
                    <span id="result-${index}" class="result-text"></span>
                </td>
            `;
            tbody.appendChild(tr);
        });
        document.querySelector('#test-view .table-container').scrollTop = 0;
    }

    function startIncorrectTest() {
        if (incorrectWords.length === 0) return alert("저장된 오답이 없습니다!");
        switchView('test');
        document.getElementById('main-title').innerText = '오답 집중 테스트 🔥';
        startTestWithData(incorrectWords);
    }

    function shuffleArray(array) {
        let newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function shuffleIncorrectNote() {
        if (incorrectWords.length === 0) return alert("저장된 오답이 없습니다!");
        incorrectWords = shuffleArray(incorrectWords);
        try { localStorage.setItem('incorrectWords', JSON.stringify(incorrectWords)); } catch(e) {}
        renderIncorrectNote();
    }

    function restoreIncorrectNoteOrder() {
        if (incorrectWords.length === 0) return alert("저장된 오답이 없습니다!");
        incorrectWords.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        try { localStorage.setItem('incorrectWords', JSON.stringify(incorrectWords)); } catch(e) {}
        renderIncorrectNote();
    }

    function startRangeIncorrectTest() {
        if (incorrectWords.length === 0) return alert("저장된 오답이 없습니다!");
        
        const rangeStr = prompt(`시험 볼 오답노트 번호 범위를 입력하세요.\n(예: 1-10) [현재 총 ${incorrectWords.length}개]`, `1-${incorrectWords.length}`);
        if (!rangeStr) return;
        
        const parts = rangeStr.split('-');
        if (parts.length !== 2) return alert("형식에 맞게 입력해주세요. (예: 1-10)");
        
        const start = parseInt(parts[0].trim(), 10);
        const end = parseInt(parts[1].trim(), 10);
        
        if (isNaN(start) || isNaN(end) || start < 1 || end > incorrectWords.length || start > end) {
            return alert("유효하지 않은 범위입니다. 번호를 다시 확인해주세요.");
        }
        
        const targetWords = incorrectWords.slice(start - 1, end);
        
        switchView('test');
        document.getElementById('main-title').innerText = `오답 집중 테스트 🔥 (${start}~${end}번)`;
        startTestWithData(targetWords, targetWords.length); 
    }

    function addNoteToBook(index) {
        const item = incorrectWords[index];
        const exists = myBookList.some(w => w.word === item.word);
        if (exists) return alert(`'${item.word}' 은(는) 이미 내 단어장에 보관되어 있습니다.`);
        
        myBookList.push({ word: item.word, meanings: item.meanings });
        localStorage.setItem('userCustomBookStore', JSON.stringify(myBookList));
        alert(`'${item.word}' 단어를 내 단어장에 추가했습니다!`);
    }

    function deleteFromNote(index) {
        if (confirm(`'${incorrectWords[index].word}' 단어를 오답노트에서 지울까요?`)) {
            incorrectWords.splice(index, 1);
            try { localStorage.setItem('incorrectWords', JSON.stringify(incorrectWords)); } catch(e) {}
            renderIncorrectNote(); 
        }
    }

    function renderIncorrectNote() {
        const tbody = document.getElementById('note-body');
        tbody.innerHTML = '';
        if (incorrectWords.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="padding: 40px; color: #888;">오답노트가 비어있습니다.</td></tr>`;
            return;
        }
        incorrectWords.forEach((q, index) => {
            const safeMeanings = Array.isArray(q.meanings) ? q.meanings : [q.meanings];
            const tr = document.createElement('tr');
            const hideClass = isMeaningHidden ? 'concealed' : ''; 
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td style="font-weight: bold; color: #c0392b; font-size: 16px;">${q.word}</td>
                <td style="padding: 10px;">
                    <div class="${hideClass}" style="display:inline-block; padding: 6px 10px; width: 100%; box-sizing: border-box; color: #007bff; font-weight: bold;">${safeMeanings.join(', ')}</div>
                </td>
                <td>
                    <button class="btn-add-book" onclick="addNoteToBook(${index})">➕ 단어장</button>
                    <button class="btn-delete" style="margin-left: 5px;" onclick="deleteFromNote(${index})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function clearIncorrectNote() {
        if (confirm("정말로 오답노트를 모두 지우시겠습니까?")) {
            incorrectWords = [];
            try { localStorage.removeItem('incorrectWords'); } catch(e) {}
            renderIncorrectNote();
        }
    }

    // 레벤슈타인 거리 알고리즘 (글자 차이 계산)
    function getEditDistance(a, b) {
        if(a.length === 0) return b.length;
        if(b.length === 0) return a.length;
        const matrix = [];
        for(let i = 0; i <= b.length; i++) matrix[i] = [i];
        for(let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for(let i = 1; i <= b.length; i++){
            for(let j = 1; j <= a.length; j++){
                if(b.charAt(i-1) == a.charAt(j-1)) matrix[i][j] = matrix[i-1][j-1];
                else matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
            }
        }
        return matrix[b.length][a.length];
    }

    // 🌟 수정된 채점 로직 (품사 엄격 구분 및 길이 조건 추가)
    function isFlexibleMatch(userInput, meanings) {
        // 공백만 제거하고 품사 어미(하다, 한 등)는 그대로 유지
        const userParts = userInput.split(/[,/]+/).map(s => s.trim().replace(/\s+/g, '')).filter(s => s.length > 0);
        if (userParts.length === 0) return false;

        return userParts.some(cleanInput => {
            return meanings.some(meaning => {
                const cleanMeaning = String(meaning).replace(/\s+/g, '');
                
                // 1. 완전히 일치하는 경우
                if (cleanMeaning === cleanInput) return true;
                
                // 2. 유의어 그룹 내 포함 여부 (품사 어미까지 동일한지 체크)
                let isSynonymMatch = false;
                synonymGroups.forEach(group => {
                    const matchInput = group.find(g => cleanInput.includes(g));
                    const matchMeaning = group.find(g => cleanMeaning.includes(g));
                    
                    // 어근이 유의어 그룹에 속하고, 뒤에 붙은 어미(품사)가 똑같을 때만 인정
                    if (matchInput && matchMeaning) {
                        const tailInput = cleanInput.replace(matchInput, '');
                        const tailMeaning = cleanMeaning.replace(matchMeaning, '');
                        if (tailInput === tailMeaning) {
                            isSynonymMatch = true;
                        }
                    }
                });
                if (isSynonymMatch) return true;

                // 3. 오타 허용 조건 강화: 정답의 길이가 4글자 이상일 때만 거리 1 허용
                // 예: '방해하다'(4) vs '당해하다'(4) -> 허용 (O)
                // 예: '이질성'(3) vs '동질성'(3) -> 길이 조건 미달로 허용 안함 (X)
                if (cleanMeaning.length >= 4 && cleanInput.length >= 4) {
                    if (getEditDistance(cleanMeaning, cleanInput) <= 1) {
                        return true;
                    }
                }
                
                return false;
            });
        });
    }

    function gradeTest() {
        let total = currentQuestions.length;

        currentQuestions.forEach((q, index) => {
            const inputElement = document.getElementById(`answer-${index}`);
            const resultElement = document.getElementById(`result-${index}`);
            const safeMeanings = Array.isArray(q.meanings) ? q.meanings : [q.meanings];

            inputElement.readOnly = false;
            inputElement.disabled = false;
            inputElement.style.pointerEvents = 'auto';

            if (isFlexibleMatch(inputElement.value, safeMeanings)) {
                resultElement.textContent = "⭕ 정답";
                resultElement.className = "result-text correct";
                inputElement.classList.add('is-correct'); 
            } else {
                resultElement.innerHTML = `❌ 오답 (정답: <span style="color: #007bff;">${safeMeanings.join(', ')}</span>)`;
                resultElement.className = "result-text incorrect"; 
                
                if (!incorrectWords.some(n => n.word === q.word)) {
                    incorrectWords.push({ word: q.word, meanings: safeMeanings, timestamp: Date.now() });
                }
            }
        });
        
        try { localStorage.setItem('incorrectWords', JSON.stringify(incorrectWords)); } catch(e) {}
        
        let finalScore = 0;
        currentQuestions.forEach((q, index) => {
            const inputElement = document.getElementById(`answer-${index}`);
            if (inputElement.classList.contains('is-correct')) {
                finalScore++;
            }
        });

        document.getElementById('score-board').innerText = `결과: ${finalScore} / ${total} 점`;
        document.querySelector('#test-view .table-container').scrollTop = 0;
    }
</script>
