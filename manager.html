<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>단어장 관리기</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 15px; display: flex; justify-content: center; margin: 0; min-height: 100vh; box-sizing: border-box; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; max-width: 900px; display: flex; flex-direction: column; 
        }
        h1 { text-align: center; color: #333; border-bottom: 2px solid #555; padding-bottom: 10px; }
        
        /* 입력 폼 디자인 */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .input-group input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; }
        .btn-add { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background-color: #219a52; }

        /* 표 디자인 */
        .table-container { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        th { background-color: #f1f3f5; position: sticky; top: 0; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background-color: #c0392b; }

        /* 결과 코드 박스 */
        .code-box { display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: monospace; font-size: 13px; resize: vertical; box-sizing: border-box; }
        .btn-copy { background-color: #2980b9; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-copy:hover { background-color: #1f618d; }
    </style>

    <script src="words.js" charset="UTF-8"></script>
</head>
<body>

<div class="container">
    <h1>나만의 단어장 관리기 ✏️</h1>
    
    <div class="input-group">
        <input type="text" id="new-word" placeholder="영단어 입력 (예: abandon)">
        <input type="text" id="new-meanings" placeholder="뜻 입력 (쉼표로 구분. 예: 버리다, 포기하다)">
        <button class="btn-add" onclick="addWord()">추가하기</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">NO</th>
                    <th style="width: 30%;">단어 (Word)</th>
                    <th style="width: 50%;">뜻 (Meanings)</th>
                    <th style="width: 10%;">관리</th>
                </tr>
            </thead>
            <tbody id="word-list-body">
                </tbody>
        </table>
    </div>

    <div class="code-box">
        <h3 style="margin: 0; color: #333;">👇 완성된 words.js 코드 (자동 생성됨)</h3>
        <textarea id="code-output" readonly></textarea>
        <button class="btn-copy" onclick="copyCode()">복사하기 (Copy)</button>
        <p style="font-size: 13px; color: #666; text-align: center; margin-top: 0;">
            * 복사하기 버튼을 누른 후, 기존 <b>words.js</b> 파일의 내용을 전부 지우고 붙여넣기 하세요!
        </p>
    </div>
</div>

<script>
    // words.js에서 불러온 defaultWords 배열을 복사하여 사용
    let wordList = typeof defaultWords !== 'undefined' ? [...defaultWords] : [];

    // 단어 목록을 화면에 그리는 함수
    function renderTable() {
        const tbody = document.getElementById('word-list-body');
        tbody.innerHTML = '';

        wordList.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td style="font-weight: bold; color: #2c3e50;">${item.word}</td>
                <td>${item.meanings.join(', ')}</td>
                <td><button class="btn-delete" onclick="deleteWord(${index})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });

        generateCode(); // 표가 업데이트될 때마다 하단 코드도 자동 업데이트
    }

    // 단어 추가 함수
    function addWord() {
        const wordInput = document.getElementById('new-word').value.trim();
        const meaningsInput = document.getElementById('new-meanings').value.trim();

        if (!wordInput || !meaningsInput) {
            alert("영단어와 뜻을 모두 입력해주세요!");
            return;
        }

        // 뜻을 쉼표(,) 기준으로 잘라서 배열로 만듦
        const meaningsArray = meaningsInput.split(',').map(s => s.trim()).filter(s => s.length > 0);

        // 새 단어를 배열 맨 끝에 추가
        wordList.push({ word: wordInput, meanings: meaningsArray });

        // 입력칸 초기화
        document.getElementById('new-word').value = '';
        document.getElementById('new-meanings').value = '';

        renderTable();
        // 리스트의 맨 아래로 스크롤 이동
        const tableContainer = document.querySelector('.table-container');
        tableContainer.scrollTop = tableContainer.scrollHeight;
    }

    // 단어 삭제 함수
    function deleteWord(index) {
        if (confirm(`'${wordList[index].word}' 단어를 삭제하시겠습니까?`)) {
            wordList.splice(index, 1);
            renderTable();
        }
    }

    // words.js용 텍스트 코드를 생성하는 함수 (핵심 기능)
    function generateCode() {
        let code = "const defaultWords = [\n";
        
        wordList.forEach((item, index) => {
            // 뜻 배열을 "뜻1", "뜻2" 형태로 문자열화
            let meaningsStr = item.meanings.map(m => `"${m}"`).join(", ");
            code += `    { word: "${item.word}", meanings: [${meaningsStr}] }`;
            
            // 마지막 단어가 아니면 쉼표(,) 추가
            if (index < wordList.length - 1) {
                code += ",\n";
            } else {
                code += "\n";
            }
        });
        
        code += "];";
        document.getElementById('code-output').value = code;
    }

    // 생성된 코드를 클립보드에 복사하는 함수
    function copyCode() {
        const textarea = document.getElementById('code-output');
        textarea.select();
        document.execCommand('copy');
        alert("코드가 복사되었습니다! words.js 파일에 덮어쓰기 해주세요.");
    }

    // 시작 시 표 그리기
    window.onload = renderTable;
</script>

</body>
</html>
